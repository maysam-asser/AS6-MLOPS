name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"

jobs:

  # 1. LINTER JOB (LIGHTWEIGHT)
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run simple linter
        run: |
          echo "Running linter..."
          echo "No lint errors found!"

  # 2. TRAIN JOB (EXPENSIVE - GATED)
  train:
    needs: linter
    runs-on: ubuntu-latest

    # Gatekeeper Logic
    if: >
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install scikit-learn

      - name: Run training script
        run: python train.py

      # Failure handling (only runs if training fails)
      - name: Create error log
        if: failure()
        run: echo "Training failed! Check logs." > error_logs.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      # Always runs (success or failure)
      - name: Cleanup step
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."