name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"

jobs:

  # 1. LINTER JOB (LIGHTWEIGHT)
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run simple linter
        run: |
          echo "Running linter..."
          echo "No lint errors found!"

  
  # 2. TRAIN JOB (EXPENSIVE)
  train:
    needs: linter
    runs-on: ubuntu-latest

    #  GATEKEEPER LOGIC
    if: |
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # SETUP PYTHON ENVIRONMENT
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # INSTALL DEPENDENCIES
      - name: Install dependencies
        run: |
          pip install scikit-learn

      # RUN REAL TRAINING SCRIPT
      - name: Run training script
        run: python train.py

      # 3. FAILURE HANDLING
      - name: Create error log
        if: failure()
        run: echo "Training failed! Check your code." > error_logs.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: error-logs
          path: error_logs.txt

      # 4. ALWAYS RUN CLEANUP
      - name: Cleanup step
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."